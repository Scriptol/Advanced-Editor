resizer.addEventListener('mousedown', function(e) {
    e.preventDefault();
    
    document.addEventListener('mousemove', resize);
    document.addEventListener('mouseup', stopResize);
    
    document.body.style.cursor = 'col-resize';
});

function resize(e) {
    const newWidth = e.clientX;
   
    if (newWidth > 200 && newWidth < 400) {
        sidebar.style.width = newWidth + 'px';
    }
}

function stopResize() {
    document.removeEventListener('mousemove', resize);
    document.removeEventListener('mouseup', stopResize);
    document.body.style.cursor = 'default';
    localStorage.setItem('sidebarWidth', sidebar.offsetWidth);    
}

const socket = new WebSocket('ws://localhost:8080');

let DRIVES = []

function sendFromInterface(obj) {
    if (!socket) {
        console.error("WebSocket non initialisé");
        return;
    }

    if (socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify(obj));
        return;
    }

    if (socket.readyState === WebSocket.CONNECTING) {
        console.log("WebSocket → waiting…");

        socket.addEventListener("open", () => {
            socket.send(JSON.stringify(obj));
        }, { once: true });
        return;
    }

    console.error("WebSocket non disponible, état =", socket.readyState);
}

let isDriveInProject = false
function driveForProjects(drive) {
        const item = document.createElement("div");
        item.className="driveEntry"

        const icon = document.createElement("span");
        icon.innerHTML = "&#128436;"; // 🖴 
        icon.style.cssText = `font-size: 1.1em; opacity: 0.9;margin-top:-5px`;

        const label = document.createElement("span");
        label.textContent = drive;

        item.appendChild(icon);
        item.appendChild(label);

        item.onmouseenter = () => item.style.background = "#555";
        item.onmouseleave = () => item.style.background = "#000";

        item.onclick = () => {
            isDriveInProject = false;  
            currentPath = drive + "/";
            document.getElementById('folderPath').value = currentPath;
            openFolder()
        };

        return item;
}    
  

function displayFiles(files) {
    const pathInput = document.getElementById('folderPath');
    const listContainer = document.getElementById('prjlist');
    listContainer.innerHTML = ''; 

    if (isDriveInProject) {
            DRIVES.forEach(drive => {
            const btn = driveForProjects(drive);
            listContainer.appendChild(btn);
        });
        isDriveInProject = false;
        return; 
    } 

    if(files == undefined || files.length == 0) return;

    // Up directory
    const parentItem = document.createElement('p');
    parentItem.className = 'prjIna';
    parentItem.innerHTML = '<span>⬅️</span> ..';
    listContainer.appendChild(parentItem);
    
    parentItem.onclick = function() {
        let currentPath = pathInput.value.trim();
        if (/^[a-zA-Z]:\/?$/.test(currentPath)) {
            if (!currentPath.endsWith("/")) {
                currentPath += "/";
            }
            isDriveInProject = true;
            displayFiles({ files: [] });
            return;                    
        }         
        const parts = currentPath.split(/[/\\]/);
        if (parts.length > 1) {
            parts.pop(); // remove last part of the path
            pathInput.value = parts.join('/');
            openFolder();
        }
    };

    files.sort((a, b) => {
        if (a.isDirectory && !b.isDirectory) return -1;
        if (!a.isDirectory && b.isDirectory) return 1;
        return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
    });    

    files.forEach(file => {
        const item = document.createElement('p');
        item.className = 'prjIna';

        const icon = document.createElement('span');
        icon.style.marginRight = '8px'; // Petit espace entre l'icône et le texte
        icon.textContent = file.isDirectory ? '📁' : '📄';
        item.appendChild(icon);
        item.appendChild(document.createTextNode(file.name));

        item.onmouseover = function() { this.className = 'prjAct'; };
        item.onmouseout = function() { this.className = 'prjIna'; };
        
        item.onclick = function() {
            let currentPath = pathInput.value.trim();
            if (currentPath && !currentPath.endsWith('/') && !currentPath.endsWith('\\')) {
                currentPath += '/';
            }            
            const newPath = currentPath + file.name;

            if (file.isDirectory) {
                pathInput.value = newPath;
                openFolder(); 
            } else {
                setActiveRow(); 
                if(aPanel.style.display == "block") {
                    aPanel.style.display = "none";
                    ePanel.style.display = "block";
                }
                //alert("load " + newPath)
                getSource(newPath);
            }
        };

        listContainer.appendChild(item);
    });
}

function addFolder() {
    const path = document.getElementById('folderPath').value;  
    if(path == "") return
    if(path.at(-1) !== "/")   path += "/"
    const index = projects.findIndex(paire => paire[0].toLowerCase() === path.toLowerCase());
    if(index !== -1) return    

    const pair = [path, AEditFileName]
    if(projects.length==0) {
        projects[0] = pair
        buildProjectTab()        
        return
    }
    const key = path.toLowerCase();
    let i = 0;
    while (i < projects.length && projects[i][0].toLowerCase() < key) {
        i++;
    }
    projects.splice(i, 0, pair);
    buildProjectTab()
}

function removeFolder() {
    const path = document.getElementById('folderPath').value;
    if(path == "") return false;
    const index = projects.findIndex(paire => paire[0] === path);
    if (index !== -1) {
        projects.splice(index, 1);
        buildProjectTab()
        return true; 
    }
    return false;             
}

    name: "find",
    bindKey: {win: "Ctrl-F", mac: "Command-F"},
    exec: function(editor, needle) {
        if (typeof needle == "object") {
            var arg = this.name + " " + editor.getCopyText()
            editor.cmdLine.setValue(arg, 1)
            editor.cmdLine.focus()
            return
        }
        editor.find(needle);
    	}
	},{
    name: "gotoline",
    bindKey: {win: "Ctrl-L", mac: "Command-L"},
    exec: function(editor, line) {
        if (typeof line == "object") {
            var arg = this.name + " " + editor.getCursorPosition().row;
            editor.cmdLine.setValue(arg, 1)
            editor.cmdLine.focus()
            return
        }
        line = parseInt(line, 10);
        if (!isNaN(line))
            editor.gotoLine(line);
    	}
	}
	);

/**
 * @param {string} mode - 'save' ou 'load'
 * @param {function} cb - Callback(success, path, content)
 */
function AEFileDialog(mode, cb) {
    let isSaveMode = false;
    let isDriveListMode = false;
    let currentPath = document.getElementById('folderPath').value || '.';
    let title = ""
    switch(mode) {
        case "Open":
            title="Load a file and make a project"
            break;
        case "Save":
            title="Save as..."
            isSaveMode = true
            break;
        default:
            title = "Load File"
            break;
    }

    const sDialog = document.createElement("dialog");
    sDialog.style.cssText = `
        width: 450px; 
        border-radius: 8px; 
        border: 1px solid #888; 
        padding: 20px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        font-family: sans-serif;
        background: #333;
        color:white;
    `;

    sDialog.innerHTML = `
        <h3 style="margin-top:0;">${title}</h3>
        <span id="pathDisplay" style="fontWeight:"bold;margin-bottom:8px;">
            ${currentPath}
        </span>    
    `;

    function displayDrive(drive) {
        const item = document.createElement("div");
        item.className="driveEntry"

        const icon = document.createElement("span");
        icon.innerHTML = "&#128436;"; // 🖴 
        icon.style.cssText = `font-size: 1.1em; opacity: 0.9;margin-top:-5px`;

        const label = document.createElement("span");
        label.textContent = drive;

        item.appendChild(icon);
        item.appendChild(label);

        item.onmouseenter = () => item.style.background = "#555";
        item.onmouseleave = () => item.style.background = "#000";

        item.onclick = () => {
            isDriveListMode = false;  
            currentPath = drive + "/";
            document.getElementById("pathDisplay").textContent = currentPath;

            socket.send(JSON.stringify({
                type: "DIALOG_FILES",
                path: currentPath
            }));
        };

        return item;
    }    
    
    const listContainer = document.createElement("div");
    listContainer.style.cssText = `
    z-index:1;
    border: 1px solid #ccc;
    height: 180px;
    overflow-y: auto;
    margin-bottom: 15px;
    padding: 5px;
    position:relative;
    `;
    
    const nameInput = document.createElement("input");
    nameInput.type = "text";
    nameInput.placeholder = "Filename...";
    nameInput.style.cssText = `
    width: 100%;
    padding: 8px;
    box-sizing: border-box;
    margin-bottom: 15px;
    border: 1px solid #aaa;
    border-radius: 4px;
    background:black;
    color:white;
    `;    
    
    if (isSaveMode && typeof AEditFileName !== 'undefined' && AEditFileName !== "") {
        nameInput.value = extractFile(AEditFileName);
    }

    const footer = document.createElement("div");
    footer.style.textAlign = "right";

    const btnCancel = document.createElement("button");
    btnCancel.innerText = "Cancel";
    btnCancel.style.cssText = "padding: 7px 15px; margin-right:10px; cursor: pointer; background: #666; color: white; border: none; border-radius: 4px;";

    const btnIgnore = document.createElement("button");
    btnIgnore.innerText = "Ignore";
    btnIgnore.style.cssText = "padding: 7px 15px; margin-right:16px; cursor: pointer; background: #666; color: white; border: none; border-radius: 4px; font-weight: bold;";

    const btnAction = document.createElement("button");
    btnAction.innerText = mode;
    btnAction.style.cssText = `padding: 7px 15px; cursor: pointer; background: ${isSaveMode ? '#28a745' : '#007bff'}; color: white; border: none; border-radius: 4px; font-weight: bold;`;

    sDialog.appendChild(listContainer);
    sDialog.appendChild(nameInput);
    footer.appendChild(btnCancel);
    if(isSaveMode) {
        footer.appendChild(btnIgnore);    
    }
    footer.appendChild(btnAction);
    sDialog.appendChild(footer);

    document.body.appendChild(sDialog);

    sDialog.showModal();

    const refreshFileList = (data) => {
        listContainer.innerHTML = "";
        document.getElementById('pathDisplay').innerText = currentPath;

        // drives here
        if (currentPath !== "." && !currentPath.endsWith("/")) {
            currentPath += "/";
        }

        if (isDriveListMode) {
                listContainer.innerHTML = "";
                DRIVES.forEach(drive => {
                const btn = displayDrive(drive);
                listContainer.appendChild(btn);
            });
            isDriveListMode = false;
            return; 
        }                

        const up = document.createElement("div");
        up.innerHTML = '<span>⬅️</span> ..';
        up.style.cssText = "padding: 4px; cursor: pointer; color: white;";

        up.onclick = () => {
                if (/^[a-zA-Z]:\/?$/.test(currentPath)) {
                    if (!currentPath.endsWith("/")) {
                        currentPath += "/";
                    }
                    isDriveListMode = true;
                    refreshFileList({ files: [] });
                    return;                    
                } 
                else {
                    let parts = currentPath.split('/').filter(p => p && p !== ".");
                    if (parts.length > 0) {
                    parts.pop();
                    if (parts.length === 1 && /^[a-zA-Z]:$/.test(parts[0])) {
                        currentPath = parts[0] + "/";
                    } 
                    else if (parts.length > 0) {
                        currentPath = parts.join('/');
                    } 
                    else {
                        currentPath = ".";
                    }
                }

                if (currentPath !== "." && !currentPath.endsWith("/")) {
                    currentPath += "/";
                }
                
                //alert(currentPath)
                socket.send(JSON.stringify({ 
                    type: 'DIALOG_FILES', 
                    path: currentPath 
                }));
            }
        };

        listContainer.appendChild(up);
        let files = data.files
        files.sort((a, b) => {
            if (a.isDirectory && !b.isDirectory) return -1;
            if (!a.isDirectory && b.isDirectory) return 1;
            return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
        });           

        files.forEach(file => {
            const item = document.createElement("div");
            item.style.cssText = "padding: 4px; cursor: pointer; font-size: 0.9em; border-bottom: 1px solid #444;";
            const icon = file.isDirectory ? "&#128193;" : "&#128196;";
            item.innerHTML = `<span style="color: ${file.isDirectory ? '#f39c12' : '#7f8c8d'};">${icon}</span> ${file.name}`;

            item.onclick = () => {
                if (file.isDirectory) {
                    let base = (currentPath === ".") ? "" : currentPath;
                    if (base !== "" && !base.endsWith("/")) base += "/";
                    currentPath = base + file.name;
                    socket.send(JSON.stringify({ type: 'DIALOG_FILES', path: currentPath }));
                } else {
                    nameInput.value = file.name;
                }
            };
            listContainer.appendChild(item);
        });
    };

    const messageHandler = (event) => {
        try {
            const data = JSON.parse(event.data);
            
            if (data.type === 'FILE_LIST') {
                refreshFileList(data);
            } 
            else if (data.type === 'SAVE_SUCCESS' && isSaveMode) {
                changedStatus(false);
                const sep = (currentPath == "." || currentPath.at(-1) == "/") ? "" : "/" 
                AEditFileName = currentPath + sep + nameInput.value;
                displayFileName();
                if(currentPath ===  document.getElementById('folderPath').value) {
                    openFolder()
                }
                sDialog.close();
                if(cb) cb(true, AEditFileName);
            } 
            else if (data.type === 'FILE_CONTENT' && !isSaveMode) {
                const sep = (currentPath == "." || currentPath.at(-1) == "/") ? "" : "/" 
                AEditFileName = currentPath + sep + nameInput.value;
                editor.setValue(data.content); // replace content
                displayFileName();
                changedStatus(false);
                document.getElementById('folderPath').value = currentPath;
                openFolder()
                addFolder()
                sDialog.close();
                if(cb) cb(true, AEditFileName, data.content);
            }
            else if (data.type === 'ERROR') {
                alert("Error: " + data.message);
            }
        } catch (e) { console.error(e); }
    };

    socket.addEventListener('message', messageHandler);
    socket.send(JSON.stringify({ 
        type: 'DIALOG_FILES', 
        path: currentPath 
    }));

    btnAction.onclick = () => {
        const fname = nameInput.value.trim();
        if (!fname) return nameInput.focus();
        if(currentPath.at(-1) != "/") currentPath += "/"

        if (isSaveMode) { 
            socket.send(JSON.stringify({
                type: 'SAVE_DOC',
                filename: currentPath + "/" + fname,
                content: editor.getValue()
            }));
        } 
        else  { // Open
            socket.send(JSON.stringify({
                type: 'GET_CONTENT',
                path: currentPath + "/" + fname,
            }));
            openProject(currentPath)
            addFolder()
        }
        if(cb) cb(true, "")
        sDialog.close();
    };

    btnCancel.onclick = () => {
        if(cb) cb(false, "");
        sDialog.close();
    };

    btnIgnore.onclick = () => {
        if(cb) cb(true, "")
        sDialog.close();
    }        

    sDialog.onclose = () => {
        socket.removeEventListener('message', messageHandler);
        sDialog.remove(); 
    };
}

// PATH
    
function extractDir(fullpath) {
    if(fullpath===undefined) return ""
    var p1 = fullpath.lastIndexOf("/");
    var p2 = fullpath.lastIndexOf("\\");
    if(p2 > p1) p1 = p2;
    return fullpath.substr(0, p1 + 1);
}

function extractFile(fullpath) {
    if(fullpath===undefined) return ""
    var p1 = fullpath.lastIndexOf("/");
    var p2 = fullpath.lastIndexOf("\\");
    if(p2 > p1) p1 = p2;
    return fullpath.substr(p1 + 1);
} 
    
function extractNode(fname) {
    var p = fname.lastIndexOf(".")
    if(p == -1) p = fname.length
    return fname.substr(0, p)
}

var origin;
function act(element) {
	var command = element.id;
	var temp;
	switch(command) {
		case "new":	      
            clearDoc();	
            break;
		case "indent":		
            editor.indent();	
            break;	
		case "outdent":		
            editor.blockOutdent();	
            break;					
		case "cut": 
			editorMyClipboard = editor.getCopyText();
			editor.remove(); 
			break;	
		case "copy":	
		    editorMyClipboard = editor.getCopyText();
		    break;	
		case "paste":
		    editor.insert(editorMyClipboard);
		    break;	
		case "set":
		case "clear":
			break;
		case "save":
            origin = AEditFileName;
			save(true);
			break;
		case "find":
            editor.execCommand("find")
			break;
        case "replace":
            editor.execCommand("replace")
            break;
		case "next":	
			editor.findNext();
			break;
        case "top":
            editor.gotoLine(0,0)
            break;  
        case "bottom":
            editor.gotoLine(99990,0)
            break; 
		case "comment":
			var current = editor.session.getTextRange(editor.getSelectionRange());
            const cpos = editor.getCursorPosition()
            let col = cpos.column + 2
            if(current=="") {
                current = " "
                col++
            }
            temp = "/*" + current + "*/";	
			editor.remove();
			editor.insert(temp);	
            editor.moveCursorTo(cpos.row,col);
			break;  
        case "nocomment":
            var xy = editor.getCursorPosition()
            editor.find("*/", {start: xy})
            editor.replace("")
            editor.find("/*", {start: xy, backwards:true})
            editor.replace("")
            break;
		case "link":
			var current = editor.session.getTextRange(editor.getSelectionRange());
			temp = "<a href=''>" + current + "</a>";	
			editor.remove();
			editor.insert(temp);	
			break;            
		case "table":
			buildtable(editor);
			break;
		case "undo":
			editor.undo();
			break;	
		case "redo":
			editor.redo();
			break;	
        case "preview":
            preview(true);
            break;
        case "about":
            about()
            break;
		case "quit":
			quit();
			break;	
		default:
			alert("Unknown command " +command);
	}			
	editor.focus();
}

function editDoc(jobj) {

    if(jobj.ext in languageExt) {

    changedStatus(false);
    config.dir=extractDir(AEditFileName);
    config.active=AEditFileName
    const index = config.projects.findIndex(p => p[0] === config.folder);
    if (index !== -1) {

    }

function openActive() {
    const index = config.projects.findIndex(p => p[0] === config.folder);
    if(index == -1) return false
    const fname = config.projects[index][1]
    if(fname == undefined || fname == "") return false
    getSource(fname)
    return true
}
    
socket.onmessage = (event) => {
    var jobj = JSON.parse(event.data);
    switch(jobj.type) {
    case 'directory-list':
        displayFiles(jobj.files);
        showFiles()
        openActive()
        break;
    case "openDoc":    
        setActiveRow(); 
        if(aPanel.style.display=="block") {
            aPanel.style.display="none"    
            ePanel.style.display="block"    
        }
        if(!contentToSave) {
            editDoc(jobj)
            return
        } 
        // ask to cancel or replace, save before or not
        AEFileDialog('Save', function(result, name) {
            if(result) editDoc(jobj)
            return
        });
        break
    case "message": 
        alert(jobj.content)   
        break;
    case "notification":
    case "mouse":
        break;  
    case "status":  
        updateStatusBar(jobj.content);   
        break;    
    case "saved":
        displayFileName();
        changedStatus(false);   
        break;
    case "ASK_MKDIR":
        const reponse = confirm(` "${jobj.dir}" missing. Create it ?`);
        if (reponse) {
            socket.send(JSON.stringify({ 
                type: 'MAKE_DIR' 
            }));
        }            
        break;
    case "DRIVE_LIST":
        DRIVES = jobj.drives
        break;        
    case "SAVED":
        changedStatus(false);
        break;
    case "SAVE_SUCCESS":        
    case "FILE_LIST":
    case "ERROR":        
        break
    default:
        alert("Unknow message: " + jobj.type);
        break;    
    }
}

    editor.focus();

var AEditSyncPath = undefined
var AEditFileName = ""

async function listDirectory(dirHandle, container) {
  container.innerHTML = ""; // clear previous listing

  for await (const entry of dirHandle.values()) {
    const item = document.createElement("div");
    item.style.cursor = "pointer";

    if (entry.kind === "directory") {
      item.textContent = "📁 " + entry.name;

      item.onclick = async () => {
        await listDirectory(entry, container);
      };

    } else if (entry.kind === "file") {
      item.textContent = "📄 " + entry.name;

      item.onclick = async () => {
        const file = await entry.getFile();
        const text = await file.text();
        document.getElementById("content").textContent =
          `File: ${file.name}\n\n${text}`;
      };
    }

    container.appendChild(item);
  }
}

function save(winflag) {
    if(editor.getValue().length == 0) return; 
    const nflag = AEditFileName == undefined || AEditFileName == "";
    if(winflag || nflag)  { 
        var x = winsave() 
        if(x != "")  {
            AEditFileName = x;
        }    
        return
    }
    editor.focus();
    setActiveRow();
    let content = editor.getValue();
    if(content.length == 0) return; 
    let a = { 
        'type': 'SAVE_DOC',
        'filename': AEditFileName,
        'content': content        
    };
    sendFromInterface(a);         
}   


function buildtable(editor) {
    var rows = 6;
    var cols = 4;
    if(rows > 0 && cols > 0) {
		var table = "<table><tbody>\n";
        table += "<thead><tr>";
		for (var j=0; j < cols; j++) {
            table += "<th></th>";
		}
		table += "</tr></thead>\n";
        table += "<tbody>\n";
		for (var i=1; i < rows; i++) {
			table += "<tr>";
			for (var j=0; j < cols; j++) {
				table += "<td></td>";
			}
			table += "</tr>\n";
		}
		table += "<tbody></table>\n";
		editor.insert(table);   
	}	
}
